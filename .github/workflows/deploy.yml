name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare build output
        run: |
          mkdir -p dist
          cp -r index.html dist/index.html
          cp -r assets dist/
          rm -rf dist/.git dist/.github

      - name: Inject Firebase API key
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          find dist -type f -name "*.js" -o -name "*.html" | xargs sed -i "s|FIREBASE_API_KEY|${FIREBASE_API_KEY}|g"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
