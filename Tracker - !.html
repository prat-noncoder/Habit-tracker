<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0B12;
    --bg-wash: radial-gradient(ellipse 120% 60% at 50% -10%, #141428 0%, #0B0B12 55%);
    --panel: rgba(255,255,255,0.05);
    --panel-raised: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.1);
    --text: #F3F4F8;
    --text-dim: #9A9DAB;
    --text-faint: #5F6270;
    --accent-a: #00E5FF;
    --accent-b: #FF2E93;
    --accent: #00E5FF;
    --accent-dim: rgba(0,229,255,0.15);
    --green-a: #B6FF3C;
    --green-b: #6FE86B;
    --danger: #FF5C7A;

    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  body.light{
    --bg: #F4F5F8;
    --bg-wash: radial-gradient(ellipse 120% 60% at 50% -10%, #ffffff 0%, #F4F5F8 55%);
    --panel: rgba(20,20,30,0.045);
    --panel-raised: rgba(20,20,30,0.07);
    --border: rgba(20,20,30,0.1);
    --text: #17181F;
    --text-dim: #5B5E6B;
    --text-faint: #8D909C;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    background-image:var(--bg-wash);
    background-attachment:fixed;
    color:var(--text);
    font-family:var(--font-body);
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
    transition:background-color 0.2s ease, color 0.2s ease;
  }
  #app{ max-width:480px; margin:0 auto; height:100vh; height:100dvh; display:flex; flex-direction:column; position:relative; }
  .glass{ background:var(--panel); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%); border:1px solid var(--border); }

  .screen{ flex:1; overflow-y:auto; display:none; padding-bottom:104px; -webkit-overflow-scrolling:touch; }
  .screen.active{ display:block; }

  /* ---------- App header (greeting + theme toggle) ---------- */
  .app-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 20px) 20px 16px;
  }
  .greeting-sub{ font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint); letter-spacing:0.04em; text-transform:uppercase; }
  .greeting-name{ font-family:var(--font-display); font-size:21px; font-weight:700; letter-spacing:-0.01em; margin-top:2px; }
  .theme-toggle{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--border); background:var(--panel);
    color:var(--text-dim); flex-shrink:0;
  }
  .theme-toggle svg{ width:19px; height:19px; }
  .theme-toggle:active{ transform:scale(0.9); }

  /* ---------- Date strip ---------- */
  .strip-header{ display:flex; align-items:center; justify-content:center; padding:0 20px 12px; }
  .strip-label-btn{ display:flex; align-items:center; gap:8px; background:none; border:none; font-family:var(--font-display); font-size:16.5px; font-weight:700; color:var(--text); }
  .strip-label-btn svg{ width:16px; height:16px; stroke:var(--text-faint); }
  .week-strip{ display:flex; gap:8px; padding:0 20px 22px; overflow-x:auto; scroll-snap-type:x proximity; }
  .week-day{
    flex:0 0 auto; width:44px; display:flex; flex-direction:column; align-items:center; gap:7px;
    padding:11px 4px; border-radius:16px; cursor:pointer; scroll-snap-align:center;
    transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .week-day:active{ transform:scale(0.92); }
  .week-day.disabled{ opacity:0.22; pointer-events:none; }
  .week-day .wd-label{ font-family:var(--font-mono); font-size:10px; color:var(--text-faint); letter-spacing:0.03em; }
  .week-day .wd-num{ font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--text); }
  .week-day.today-mark:not(.selected){ border:1.5px solid var(--accent); }
  .week-day.selected{ background:linear-gradient(145deg, var(--accent-a), var(--accent-b)); box-shadow:0 6px 20px -6px rgba(0,229,255,0.4); }
  .week-day.selected .wd-label, .week-day.selected .wd-num{ color:#06070C; }

  /* ---------- Daily score card ---------- */
  .score-card{ margin:0 20px 20px; border-radius:24px; padding:20px 20px; display:flex; align-items:center; gap:18px; }
  .score-ring-wrap{ position:relative; width:64px; height:64px; flex-shrink:0; }
  .score-ring-wrap svg{ width:64px; height:64px; transform:rotate(-90deg); }
  .score-ring-bg{ fill:none; stroke:rgba(128,128,150,0.18); stroke-width:6; }
  .score-ring-fill{ fill:none; stroke:url(#scoreGradient); stroke-width:6; stroke-linecap:round; transition:stroke-dasharray 0.5s cubic-bezier(.16,1,.3,1); }
  .score-ring-pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:14px; font-weight:700; color:var(--text); }
  .score-mid{ flex:1; min-width:0; }
  .score-title{ font-family:var(--font-display); font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  .score-sub{ font-family:var(--font-body); font-size:12.5px; color:var(--text-dim); margin-top:3px; }
  .score-frac{ font-family:var(--font-mono); font-size:20px; font-weight:600; background:linear-gradient(135deg, var(--green-a), var(--green-b)); -webkit-background-clip:text; background-clip:text; color:transparent; flex-shrink:0; text-align:right; }
  .score-frac span{ font-size:12px; color:var(--text-faint); -webkit-text-fill-color:var(--text-faint); }

  .section-label{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.09em; text-transform:uppercase; color:var(--text-faint); padding:0 20px; margin-bottom:12px; }
  .list{ padding:0 20px; display:flex; flex-direction:column; gap:10px; }

  .habit-card{ display:flex; align-items:center; gap:13px; border-radius:18px; padding:14px 12px 14px 14px; cursor:pointer; transition:transform 0.12s ease; }
  .habit-card:active{ transform:scale(0.98); }
  .check-box{ width:30px; height:30px; border-radius:11px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform 0.18s cubic-bezier(.34,1.56,.64,1), background 0.18s ease, border-color 0.18s ease; }
  .check-box svg{ width:15px; height:15px; opacity:0; transform:scale(0.5); transition:opacity 0.15s ease, transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  .check-box.checked{ border-color:transparent; background:linear-gradient(145deg, var(--green-a), var(--green-b)); box-shadow:0 4px 14px -4px rgba(182,255,60,0.5); }
  .check-box.checked svg{ opacity:1; transform:scale(1); }
  .habit-name{ font-size:15.5px; font-weight:500; flex:1; transition:color 0.15s ease; }
  .habit-name.done{ color:var(--text-faint); text-decoration:line-through; text-decoration-thickness:1.5px; }
  .dots-btn{ background:none; border:none; color:var(--text-faint); padding:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .dots-btn svg{ width:18px; height:18px; }

  .empty-state{ padding:44px 20px; text-align:center; color:var(--text-faint); font-size:14px; line-height:1.6; }

  .fab{
    position:absolute; right:20px; bottom:calc(94px + env(safe-area-inset-bottom));
    width:56px; height:56px; border-radius:50%;
    background:linear-gradient(145deg, var(--accent-a), var(--accent-b)); color:#06070C; border:none; font-size:26px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px -6px rgba(0,229,255,0.45); z-index:20; transition:transform 0.12s ease;
  }
  .fab:active{ transform:scale(0.9); }

  /* ---------- Trend chart (now on Today) ---------- */
  .trend-card{ margin:0 20px 20px; border-radius:22px; padding:18px 18px 14px; }
  .trend-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .trend-title{ font-family:var(--font-display); font-size:16px; font-weight:700; }
  .trend-toggle{ display:flex; gap:4px; background:rgba(128,128,150,0.1); border-radius:10px; padding:3px; }
  .trend-opt{ padding:6px 11px; border-radius:8px; font-size:11.5px; font-weight:600; color:var(--text-faint); cursor:pointer; font-family:var(--font-mono); }
  .trend-opt.selected{ background:linear-gradient(145deg, var(--accent-a), var(--accent-b)); color:#06070C; }
  .trend-chart-wrap{ width:100%; height:110px; }

  /* ---------- Progress: compact scrollable multi-month heatmap ---------- */
  .habit-progress-card{ border-radius:20px; padding:16px 16px; margin:0 20px 12px; cursor:pointer; transition:transform 0.12s ease; }
  .habit-progress-card:active{ transform:scale(0.985); }
  .hp-head{ display:flex; align-items:center; gap:9px; margin-bottom:13px; }
  .hp-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .hp-head .habit-name{ font-family:var(--font-display); font-weight:600; flex:initial; font-size:15px; }
  .hp-streak{ margin-left:auto; font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); }
  .heatmap-scroll{ overflow-x:auto; padding-bottom:2px; }
  .heatmap-inner{ display:inline-flex; flex-direction:column; gap:3px; }
  .heatmap-months{ display:flex; gap:2px; padding-left:1px; }
  .heatmap-month-label{ font-family:var(--font-mono); font-size:9px; color:var(--text-faint); flex-shrink:0; }
  .heatmap-grid{ display:flex; gap:2px; }
  .heatmap-col{ display:flex; flex-direction:column; gap:2px; }
  .heatmap-box{ width:9px; height:9px; border-radius:2.5px; background:rgba(128,128,150,0.14); flex-shrink:0; }
  .heatmap-box.filled{ background:var(--hb-color); }
  .heatmap-box.empty-day{ background:transparent; }

  /* Detail (monthly view) */
  .detail-header{ display:flex; align-items:center; gap:12px; padding:calc(env(safe-area-inset-top) + 20px) 20px 10px; }
  .back-btn{ width:36px; height:36px; border-radius:12px; color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .detail-title{ font-family:var(--font-display); font-size:19px; font-weight:700; display:flex; align-items:center; gap:9px; }
  .stat-row{ display:flex; gap:10px; padding:6px 20px 20px; }
  .stat-box{ flex:1; border-radius:16px; padding:16px; }
  .stat-num{ font-family:var(--font-mono); font-size:24px; font-weight:600; }
  .stat-cap{ font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em; margin-top:3px; }
  .month-nav{ display:flex; align-items:center; justify-content:space-between; padding:0 20px 16px; }
  .month-nav-btn{ width:34px; height:34px; border-radius:11px; color:var(--text-dim); font-size:16px; display:flex; align-items:center; justify-content:center; }
  .month-nav-btn:active{ transform:scale(0.9); }
  .month-nav-label{ font-family:var(--font-display); font-size:15.5px; font-weight:600; }
  .month-grid-wrap{ padding:0 20px 30px; }
  .dow-row{ display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; margin-bottom:9px; }
  .dow-cell{ text-align:center; font-family:var(--font-mono); font-size:10px; color:var(--text-faint); }
  .month-grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
  .day-box{ aspect-ratio:1; border-radius:9px; background:rgba(128,128,150,0.08); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--text-faint); transition:background 0.2s ease, border-color 0.2s ease; }
  .day-box.filled{ border-color:transparent; color:rgba(0,0,0,0.55); font-weight:600; }
  .day-box.empty{ background:transparent; border:none; }
  .day-box.today-mark{ border-color:var(--accent); border-width:1.5px; }
  .day-box.future{ opacity:0.25; }

  /* ---------- Notes screen ---------- */
  .note-card{ display:flex; align-items:center; gap:13px; border-radius:18px; padding:14px 12px 14px 14px; cursor:pointer; }
  .note-check{ width:30px; height:30px; border-radius:11px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform 0.18s cubic-bezier(.34,1.56,.64,1); }
  .note-check svg{ width:15px; height:15px; opacity:0; transform:scale(0.5); transition:opacity 0.15s ease, transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  .note-check.checked svg{ opacity:1; transform:scale(1); }
  .note-body{ flex:1; min-width:0; }
  .note-text{ font-size:15.5px; font-weight:500; }
  .note-text.done{ color:var(--text-faint); text-decoration:line-through; text-decoration-thickness:1.5px; }
  .note-meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:3px; }
  .done-divider{ padding:22px 20px 12px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); display:flex; align-items:center; gap:8px; }
  .done-divider::after{ content:''; flex:1; height:1px; background:var(--border); }

  /* ---------- Bottom nav ---------- */
  .bottomnav{
    position:absolute; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom));
    display:flex; background:rgba(20,20,30,0.7); backdrop-filter:blur(26px) saturate(160%); -webkit-backdrop-filter:blur(26px) saturate(160%);
    border:1px solid var(--border); border-radius:22px; padding:10px 6px; z-index:10; box-shadow:0 14px 40px -10px rgba(0,0,0,0.5);
  }
  body.light .bottomnav{ background:rgba(255,255,255,0.7); }
  .nav-btn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; color:var(--text-faint); font-family:var(--font-body); font-size:10.5px; padding:6px 0; transition:color 0.15s ease; }
  .nav-btn.active{ color:var(--text); }
  .nav-btn svg{ width:21px; height:21px; transition:stroke 0.15s ease; }
  .nav-btn.active svg{ stroke:var(--accent); }

  /* ---------- Modals ---------- */
  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.65); display:none; align-items:flex-end; z-index:100; }
  .modal-backdrop.active{ display:flex; }
  .modal{
    background:var(--bg); background-image:linear-gradient(180deg, rgba(0,229,255,0.06), transparent 30%);
    border:1px solid var(--border); border-radius:26px 26px 0 0; width:100%; max-width:480px; margin:0 auto;
    padding:24px 20px calc(26px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto;
    animation:slideUp 0.25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp{ from{ transform:translateY(24px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal-title{ font-family:var(--font-display); font-size:19px; font-weight:700; margin-bottom:20px; }
  .field-label{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); margin-bottom:9px; display:block; }
  .field{ margin-bottom:20px; }
  input[type=text]{ width:100%; background:rgba(128,128,150,0.08); border:1px solid var(--border); color:var(--text); font-family:var(--font-body); font-size:15px; padding:13px 14px; border-radius:14px; outline:none; }
  input[type=text]:focus{ border-color:var(--accent); }
  .color-row{ display:flex; gap:11px; flex-wrap:wrap; }
  .swatch{ width:34px; height:34px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform 0.12s ease; }
  .swatch.selected{ border-color:var(--text); transform:scale(1.12); }
  .repeat-row{ display:flex; gap:8px; }
  .repeat-opt{ flex:1; padding:10px; text-align:center; background:rgba(128,128,150,0.08); border:1px solid var(--border); border-radius:12px; font-size:13px; color:var(--text-dim); cursor:pointer; }
  .repeat-opt.selected{ background:var(--accent-dim); border-color:var(--accent); color:var(--text); }
  .day-picker-row{ display:flex; gap:6px; }
  .day-chip{ flex:1; aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:11px; background:rgba(128,128,150,0.08); border:1px solid var(--border); font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); cursor:pointer; }
  .day-chip.selected{ background:linear-gradient(145deg, var(--accent-a), var(--accent-b)); color:#06070C; border-color:transparent; font-weight:700; }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .btn{ flex:1; padding:15px; border-radius:14px; border:none; font-family:var(--font-body); font-size:15px; font-weight:600; cursor:pointer; transition:transform 0.1s ease; }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:linear-gradient(145deg, var(--accent-a), var(--accent-b)); color:#06070C; }
  .btn-ghost{ background:rgba(128,128,150,0.08); color:var(--text-dim); border:1px solid var(--border); }

  .picker-month-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .picker-cancel{ display:block; text-align:center; padding:15px; color:var(--text-dim); font-size:14px; margin-top:8px; }

  .ctx-menu{ position:fixed; background:var(--bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; z-index:200; box-shadow:0 16px 36px -8px rgba(0,0,0,0.5); display:none; min-width:150px; }
  .ctx-menu.active{ display:block; }
  .ctx-item{ padding:13px 17px; font-size:14.5px; color:var(--text); cursor:pointer; }
  .ctx-item:active{ background:rgba(128,128,150,0.1); }
  .ctx-item.danger{ color:var(--danger); }
  .ctx-divider{ height:1px; background:var(--border); }
  .ctx-backdrop{ position:fixed; inset:0; z-index:199; display:none; }
  .ctx-backdrop.active{ display:block; }

  .celebrate-overlay{ position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .celebrate-msg{
    background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:20px 28px;
    font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--text);
    opacity:0; transform:scale(0.85) translateY(8px); animation:celebratePop 2.4s ease forwards;
    box-shadow:0 20px 50px -12px rgba(0,0,0,0.5);
  }
  @keyframes celebratePop{
    0%{ opacity:0; transform:scale(0.85) translateY(8px); } 15%{ opacity:1; transform:scale(1) translateY(0); }
    80%{ opacity:1; transform:scale(1) translateY(0); } 100%{ opacity:0; transform:scale(0.95) translateY(-6px); }
  }
  .confetti-piece{ position:fixed; top:-20px; width:8px; height:14px; z-index:299; pointer-events:none; animation-name:confettiFall; animation-timing-function:cubic-bezier(.25,.46,.45,.94); animation-fill-mode:forwards; }
  @keyframes confettiFall{ 0%{ transform:translateY(0) rotate(0deg); opacity:1; } 100%{ transform:translateY(110vh) rotate(540deg); opacity:0.9; } }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>
<body>

<div id="app">

  <div class="app-header">
    <div>
      <div class="greeting-sub" id="greetingSub">Good morning</div>
      <div class="greeting-name" id="greetingName">Hi</div>
    </div>
    <button class="theme-toggle" id="themeToggle">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
  </div>

  <!-- SCREEN 1: TODAY -->
  <div class="screen active" id="screen-today">
    <div class="strip-header">
      <button class="strip-label-btn" id="stripCalendarBtn">
        <span id="stripMonthLabel">July 2026</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      </button>
    </div>
    <div class="week-strip" id="weekStrip"></div>

    <div class="trend-card glass">
      <div class="trend-head">
        <div class="trend-title">Trend</div>
        <div class="trend-toggle" id="trendToggle">
          <div class="trend-opt selected" data-range="7">7D</div>
          <div class="trend-opt" data-range="30">30D</div>
          <div class="trend-opt" data-range="365">Year</div>
        </div>
      </div>
      <div class="trend-chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="score-card glass" id="scoreCard">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 64 64">
          <defs>
            <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00E5FF"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "FIREBASE_API_KEY",
    authDomain: "habit-tracker-c996a.firebaseapp.com",
    projectId: "habit-tracker-c996a",
    storageBucket: "habit-tracker-c996a.firebasestorage.app",
    messagingSenderId: "42670113378",
    appId: "1:42670113378:web:3c37c8e8c24cc0d142473b"
  };
  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const NAMESPACE = "45a2b09abfc44039b3c579db5b003fcc";
  function dataDoc(key){ return doc(db, 'households', NAMESPACE, 'data', key); }

(function(){

  const PALETTE = ['#00E5FF','#FF2E93','#B6FF3C','#FFD23F','#7B61FF','#FF6B4A','#38F2C5','#FF5FA2'];
  const DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const DOW_SHORT = ['S','M','T','W','T','F','S'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#06070C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  let state = { name: '', habits: [], logs: {}, notes: [] };

  let selectedDate = fmtDate(new Date());
  let currentDetailHabit = null;
  let detailMonthCursor = new Date();
  let pickerMonthCursor = new Date();
  let ctxTarget = null;
  let trendRange = 7;
  let stripCentered = false;

  function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function escapeHtml(s){ const div=document.createElement('div'); div.textContent=s; return div.innerHTML; }
  function weekdayOf(dateKey){ return new Date(dateKey+'T00:00:00').getDay(); }
  function isScheduled(habit, dateKey){
    const days = habit.days && habit.days.length ? habit.days : [0,1,2,3,4,5,6];
    return days.includes(weekdayOf(dateKey));
  }

  // ---------- THEME ----------
  function applyTheme(mode){
    document.body.classList.toggle('light', mode==='light');
    const icon = document.getElementById('themeIcon');
    if(mode==='light'){
      icon.innerHTML = '<path d="M21 12.5A8.5 8.5 0 1 1 11.5 3a7 7 0 0 0 9.5 9.5z"/>';
    } else {
      icon.innerHTML = '<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>';
    }
  }
  document.getElementById('themeToggle').addEventListener('click', ()=>{
    const isLight = document.body.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    try{ localStorage.setItem('theme-pref', next); }catch(e){}
    renderTrendChart();
  });
  function initTheme(){
    let pref = 'dark';
    try{ pref = localStorage.getItem('theme-pref') || 'dark'; }catch(e){}
    applyTheme(pref);
  }

  // ---------- GREETING ----------
  function renderGreeting(){
    const hour = new Date().getHours();
    let phrase = 'Good morning';
    if(hour>=12 && hour<17) phrase = 'Good afternoon';
    else if(hour>=17) phrase = 'Good evening';
    document.getElementById('greetingSub').textContent = phrase;
    document.getElementById('greetingName').textContent = 'Hi ' + (state.name || '');
  }

  // ---------- STORAGE (Firebase Firestore) ----------
  async function loadState(){
    try{
      const [profileSnap, habitsSnap, notesSnap] = await Promise.allSettled([
        getDoc(dataDoc('profile')),
        getDoc(dataDoc('habits-data')),
        getDoc(dataDoc('reminders-data'))
      ]);
      if(profileSnap.status==='fulfilled' && profileSnap.value.exists()) state.name = profileSnap.value.data().name || '';
      if(habitsSnap.status==='fulfilled' && habitsSnap.value.exists()){
        const d = habitsSnap.value.data();
        state.habits = (d.habits || []).map(h=> ({ days:[0,1,2,3,4,5,6], ...h }));
        state.logs = d.logs || {};
      }
      if(notesSnap.status==='fulfilled' && notesSnap.value.exists()){
        state.notes = notesSnap.value.data().reminders || [];
      }
    }catch(e){ console.error('load error', e); }
  }
  async function saveProfile(){ try{ await setDoc(dataDoc('profile'), {name: state.name}); }catch(e){ console.error('save profile failed', e); } }
  async function saveHabits(){ try{ await setDoc(dataDoc('habits-data'), {habits: state.habits, logs: state.logs}); }catch(e){ console.error('save habits failed', e); } }
  async function saveNotes(){ try{ await setDoc(dataDoc('reminders-data'), {reminders: state.notes}); }catch(e){ console.error('save notes failed', e); } }

  // ---------- NAV ----------
  document.querySelectorAll('.nav-btn').forEach(btn=> btn.addEventListener('click', ()=> showScreen(btn.dataset.screen)));
  function showScreen(name){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    const fab = document.getElementById('fabBtn');
    if(name==='detail'){
      document.getElementById('screen-detail').classList.add('active');
      fab.style.display='none';
      return;
    }
    document.getElementById('screen-'+name).classList.add('active');
    const navBtn = document.querySelector('.nav-btn[data-screen="'+name+'"]');
    if(navBtn) navBtn.classList.add('active');
    fab.style.display = (name==='progress') ? 'none' : 'flex';
  }

  // ---------- DAILY SCORE ----------
  function renderScore(){
    const scheduled = state.habits.filter(h=> isScheduled(h, selectedDate));
    const total = scheduled.length;
    let done = 0;
    scheduled.forEach(h=>{ if(state.logs[h.id] && state.logs[h.id][selectedDate]) done++; });
    document.getElementById('scoreFrac').innerHTML = done+'<span>/'+total+'</span>';
    const pct = total===0 ? 0 : Math.round((done/total)*100);
    document.getElementById('scoreRingPct').textContent = pct+'%';
    const circumference = 2 * Math.PI * 27;
    const fillLen = (pct/100) * circumference;
    document.getElementById('scoreRingFill').setAttribute('stroke-dasharray', fillLen+' '+circumference);
    let sub = 'Ready to begin';
    if(total===0) sub = 'Nothing scheduled today';
    else if(done===0) sub = 'Ready to begin';
    else if(done===total) sub = 'All done — nice work';
    else sub = 'Keep going';
    document.getElementById('scoreSub').textContent = sub;
  }

  // ---------- DATE STRIP (today centered, symmetric, freely scrollable) ----------
  function renderWeekStrip(){
    const todayKey = fmtDate(new Date());
    const anchor = new Date(selectedDate+'T00:00:00');
    document.getElementById('stripMonthLabel').textContent = MONTHS[anchor.getMonth()]+' '+anchor.getFullYear();
    const wrap = document.getElementById('weekStrip');
    wrap.innerHTML = '';
    const RANGE = 30;
    const today = new Date();
    let todayEl = null;
    for(let i=-RANGE; i<=RANGE; i++){
      const d = new Date(today);
      d.setDate(d.getDate()+i);
      const key = fmtDate(d);
      const isFuture = key > todayKey;
      const el = document.createElement('div');
      let cls = 'week-day';
      if(isFuture) cls += ' disabled';
      else if(key===selectedDate) cls += ' selected';
      else if(key===todayKey) cls += ' today-mark';
      el.className = cls;
      el.innerHTML = `<span class="wd-label">${DOW[d.getDay()].slice(0,1)+DOW[d.getDay()].slice(1,2).toLowerCase()}</span><span class="wd-num">${d.getDate()}</span>`;
      if(!isFuture){
        el.addEventListener('click', ()=>{
          selectedDate = key;
          renderWeekStrip(); renderHabitList(); renderScore();
        });
      }
      if(i===0) todayEl = el;
      wrap.appendChild(el);
    }
    if(!stripCentered){
      stripCentered = true;
      requestAnimationFrame(()=>{
        if(todayEl){
          const target = todayEl.offsetLeft - (wrap.clientWidth/2) + (todayEl.clientWidth/2);
          wrap.scrollLeft = Math.max(0, target);
        }
      });
    }
  }
  document.getElementById('stripCalendarBtn').addEventListener('click', ()=>{
    pickerMonthCursor = new Date(selectedDate+'T00:00:00');
    renderPicker();
    document.getElementById('pickerModalBackdrop').classList.add('active');
  });

  function buildMonthCells(cursorDate, opts){
    const y = cursorDate.getFullYear(), mo = cursorDate.getMonth();
    const daysInMonth = new Date(y, mo+1, 0).getDate();
    const firstDow = new Date(y, mo, 1).getDay();
    const today = fmtDate(new Date());
    let html = '';
    for(let i=0;i<firstDow;i++) html += '<div class="day-box empty"></div>';
    for(let day=1; day<=daysInMonth; day++){
      const key = y+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const filled = opts.getFilled ? opts.getFilled(key) : false;
      const color = filled && opts.getColor ? opts.getColor(key) : null;
      const isToday = key===today;
      const isFuture = key > today;
      let cls = 'day-box';
      if(filled) cls += ' filled';
      if(isToday && opts.markToday) cls += ' today-mark';
      if(isFuture && opts.disableFuture) cls += ' future';
      html += `<div class="${cls}" data-key="${key}" style="${filled?'background:'+color:''}">${opts.showNum?day:''}</div>`;
    }
    return html;
  }

  function renderPicker(){
    document.getElementById('pickerLabel').textContent = MONTHS[pickerMonthCursor.getMonth()]+' '+pickerMonthCursor.getFullYear();
    const grid = document.getElementById('pickerGrid');
    grid.innerHTML = buildMonthCells(pickerMonthCursor, {
      getFilled:(k)=> k===selectedDate, getColor:()=> 'var(--accent)', showNum:true, disableFuture:true, markToday:true
    });
    grid.querySelectorAll('.day-box[data-key]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const key = el.dataset.key;
        if(key > fmtDate(new Date())) return;
        selectedDate = key;
        document.getElementById('pickerModalBackdrop').classList.remove('active');
        stripCentered = false;
        renderWeekStrip(); renderHabitList(); renderScore();
      });
    });
  }
  document.getElementById('pickerPrev').addEventListener('click', ()=>{ pickerMonthCursor.setMonth(pickerMonthCursor.getMonth()-1); renderPicker(); });
  document.getElementById('pickerNext').addEventListener('click', ()=>{
    const next = new Date(pickerMonthCursor); next.setMonth(next.getMonth()+1);
    if(next > new Date()) return;
    pickerMonthCursor = next; renderPicker();
  });
  document.getElementById('pickerCancel').addEventListener('click', ()=> document.getElementById('pickerModalBackdrop').classList.remove('active'));
  document.getElementById('pickerModalBackdrop').addEventListener('click', (e)=>{ if(e.target.id==='pickerModalBackdrop') e.currentTarget.classList.remove('active'); });

  // ---------- TODAY: habit list ----------
  function renderHabitList(){
    const list = document.getElementById('habitList');
    list.innerHTML = '';
    const todays = state.habits.filter(h=> isScheduled(h, selectedDate));
    if(state.habits.length===0){
      list.innerHTML = `<div class="empty-state">No habits yet.<br>Tap + to add your first one.</div>`;
      return;
    }
    if(todays.length===0){
      list.innerHTML = `<div class="empty-state">Nothing scheduled for this day.</div>`;
      return;
    }
    todays.forEach(h=>{
      const done = !!(state.logs[h.id] && state.logs[h.id][selectedDate]);
      const card = document.createElement('div');
      card.className = 'habit-card glass';
      card.innerHTML = `
        <div class="check-box ${done?'checked':''}" style="${done?'':'background:'+h.color+'22'}">${CHECK_SVG}</div>
        <span class="habit-name ${done?'done':''}">${escapeHtml(h.name)}</span>
        <button class="dots-btn" data-habit-menu="${h.id}"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
      `;
      card.addEventListener('click', (e)=>{
        if(e.target.closest('.dots-btn')) return;
        toggleHabit(h.id);
      });
      card.querySelector('.dots-btn').addEventListener('click', (e)=>{ e.stopPropagation(); openCtxMenu(e, 'habit', h.id); });
      list.appendChild(card);
    });
  }
  async function toggleHabit(id){
    const scheduled = state.habits.filter(h=> isScheduled(h, selectedDate));
    const wasComplete = scheduled.length>0 && scheduled.every(h=> state.logs[h.id] && state.logs[h.id][selectedDate]);
    if(!state.logs[id]) state.logs[id] = {};
    if(state.logs[id][selectedDate]) delete state.logs[id][selectedDate];
    else state.logs[id][selectedDate] = true;
    const nowComplete = scheduled.length>0 && scheduled.every(h=> state.logs[h.id] && state.logs[h.id][selectedDate]);
    renderHabitList(); renderProgressList(); renderScore(); renderTrendChart();
    await saveHabits();
    if(nowComplete && !wasComplete) celebrate();
  }

  function celebrate(){
    const overlay = document.createElement('div');
    overlay.className = 'celebrate-overlay';
    const msg = document.createElement('div');
    msg.className = 'celebrate-msg';
    msg.textContent = 'All done! 🎉';
    overlay.appendChild(msg);
    document.body.appendChild(overlay);
    setTimeout(()=> overlay.remove(), 2500);
    for(let i=0;i<60;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.background = PALETTE[Math.floor(Math.random()*PALETTE.length)];
      piece.style.left = Math.random()*100+'vw';
      piece.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      const duration = 2 + Math.random()*1.5, delay = Math.random()*0.4;
      piece.style.animationDuration = duration+'s';
      piece.style.animationDelay = delay+'s';
      document.body.appendChild(piece);
      setTimeout(()=> piece.remove(), (duration+delay)*1000 + 200);
    }
  }

  // ---------- PROGRESS: compact scrollable multi-month heatmap ----------
  function renderProgressList(){
    const wrap = document.getElementById('progressList');
    wrap.innerHTML = '';
    if(state.habits.length===0){
      wrap.innerHTML = `<div class="empty-state">Nothing to show yet.<br>Add a habit from the Today tab.</div>`;
      return;
    }
    state.habits.forEach(h=>{
      const streak = currentStreak(h.id);
      const card = document.createElement('div');
      card.className = 'habit-progress-card glass';
      card.innerHTML = `
        <div class="hp-head">
          <span class="hp-dot" style="background:${h.color}"></span>
          <span class="habit-name">${escapeHtml(h.name)}</span>
          <span class="hp-streak">${streak}d streak</span>
        </div>
        <div class="heatmap-scroll" data-habit-scroll="${h.id}">
          <div class="heatmap-inner">
            <div class="heatmap-months" id="months-${h.id}"></div>
            <div class="heatmap-grid" id="grid-${h.id}"></div>
          </div>
        </div>
      `;
      card.addEventListener('click', (e)=>{
        if(e.target.closest('.heatmap-scroll')) return;
        openDetail(h);
      });
      wrap.appendChild(card);
      buildHeatmap(h);
    });
    requestAnimationFrame(()=>{
      document.querySelectorAll('.heatmap-scroll').forEach(el=>{ el.scrollLeft = el.scrollWidth; });
    });
  }
  function buildHeatmap(h){
    const WEEKS_BACK = 26;
    const today = new Date();
    const endOfWeek = new Date(today);
    endOfWeek.setDate(endOfWeek.getDate() + (6 - today.getDay()));
    const startDate = new Date(endOfWeek);
    startDate.setDate(startDate.getDate() - (WEEKS_BACK*7 - 1));

    const log = state.logs[h.id] || {};
    const gridEl = document.getElementById('grid-'+h.id);
    const monthsEl = document.getElementById('months-'+h.id);
    if(!gridEl || !monthsEl) return;
    let gridHtml = '';
    let monthsHtml = '';
    let lastMonth = null;
    let colWidthPx = 11;
    for(let w=0; w<WEEKS_BACK; w++){
      const colStart = new Date(startDate);
      colStart.setDate(colStart.getDate() + w*7);
      let colCells = '';
      for(let dOffset=0; dOffset<7; dOffset++){
        const d = new Date(colStart);
        d.setDate(d.getDate() + dOffset);
        const key = fmtDate(d);
        if(d > today){ colCells += '<div class="heatmap-box empty-day"></div>'; continue; }
        const scheduled = isScheduled(h, key);
        if(!scheduled){ colCells += '<div class="heatmap-box empty-day"></div>'; continue; }
        const filled = !!log[key];
        colCells += `<div class="heatmap-box ${filled?'filled':''}" style="${filled?'--hb-color:'+h.color:''}"></div>`;
      }
      gridHtml += `<div class="heatmap-col">${colCells}</div>`;
      const monthLabel = MONTHS_SHORT[colStart.getMonth()];
      if(monthLabel !== lastMonth){
        monthsHtml += `<div class="heatmap-month-label" style="width:${colWidthPx}px">${monthLabel}</div>`;
        lastMonth = monthLabel;
      } else {
        monthsHtml += `<div class="heatmap-month-label" style="width:${colWidthPx}px"></div>`;
      }
    }
    gridEl.innerHTML = gridHtml;
    monthsEl.innerHTML = monthsHtml;
  }
  function currentStreak(habitId){
    let streak = 0; let d = new Date();
    const habit = state.habits.find(h=>h.id===habitId);
    let guard = 0;
    while(guard < 1000){
      guard++;
      const key = fmtDate(d);
      if(!isScheduled(habit, key)){ d.setDate(d.getDate()-1); continue; }
      if(state.logs[habitId] && state.logs[habitId][key]){ streak++; d.setDate(d.getDate()-1); } else break;
    }
    return streak;
  }

  function openDetail(h){
    currentDetailHabit = h;
    detailMonthCursor = new Date();
    document.getElementById('detailTitle').innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${h.color};display:inline-block;"></span> ${escapeHtml(h.name)}`;
    const log = state.logs[h.id] || {};
    document.getElementById('detailTotal').textContent = Object.values(log).filter(Boolean).length;
    renderDetailMonth();
    showScreen('detail');
  }
  document.getElementById('detailBack').addEventListener('click', ()=> showScreen('progress'));

  function renderDetailMonth(){
    if(!currentDetailHabit) return;
    document.getElementById('monthLabel').textContent = MONTHS[detailMonthCursor.getMonth()]+' '+detailMonthCursor.getFullYear();
    const log = state.logs[currentDetailHabit.id] || {};
    const grid = document.getElementById('monthGrid');
    grid.innerHTML = buildMonthCells(detailMonthCursor, {
      getFilled:(k)=> !!log[k], getColor:()=> currentDetailHabit.color, showNum:true, markToday:true, disableFuture:true
    });
  }
  document.getElementById('monthPrev').addEventListener('click', ()=>{ detailMonthCursor.setMonth(detailMonthCursor.getMonth()-1); renderDetailMonth(); });
  document.getElementById('monthNext').addEventListener('click', ()=>{
    const next = new Date(detailMonthCursor); next.setMonth(next.getMonth()+1);
    if(next > new Date()) return;
    detailMonthCursor = next; renderDetailMonth();
  });

  // ---------- TREND CHART (on Today screen) ----------
  document.querySelectorAll('.trend-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.trend-opt').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
      trendRange = parseInt(el.dataset.range,10);
      renderTrendChart();
    });
  });
  function dailyPercentFor(dateKey){
    const scheduled = state.habits.filter(h=> isScheduled(h, dateKey));
    if(scheduled.length===0) return null;
    let done = 0;
    scheduled.forEach(h=>{ if(state.logs[h.id] && state.logs[h.id][dateKey]) done++; });
    return (done/scheduled.length)*100;
  }
  function renderTrendChart(){
    const canvas = document.getElementById('trendChart');
    if(!canvas) return;
    const wrap = canvas.parentElement;
    const w = wrap.clientWidth || 300, h = 110;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,h);

    const today = new Date();
    const points = [];
    for(let i=trendRange-1;i>=0;i--){
      const d = new Date(today); d.setDate(d.getDate()-i);
      const key = fmtDate(d);
      const pct = dailyPercentFor(key);
      points.push(pct===null?0:pct);
    }
    const padX = 6, padY = 10;
    const stepX = (w - padX*2) / Math.max(1, points.length-1);
    const maxY = 100;
    function xy(i,v){ return [padX + i*stepX, padY + (h-padY*2) * (1 - v/maxY)]; }

    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, 'rgba(0,229,255,0.3)');
    grad.addColorStop(1, 'rgba(0,229,255,0)');

    ctx.beginPath();
    points.forEach((v,i)=>{ const [x,y]=xy(i,v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
    const [lastX] = xy(points.length-1, points[points.length-1]);
    ctx.lineTo(lastX, h-padY);
    ctx.lineTo(padX, h-padY);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    points.forEach((v,i)=>{ const [x,y]=xy(i,v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
    const lineGrad = ctx.createLinearGradient(0,0,w,0);
    lineGrad.addColorStop(0, '#00E5FF');
    lineGrad.addColorStop(1, '#FF2E93');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // ---------- NOTES screen ----------
  function renderNotes(){
    const pendingWrap = document.getElementById('notePendingList');
    const doneWrapOuter = document.getElementById('noteDoneWrap');
    pendingWrap.innerHTML = ''; doneWrapOuter.innerHTML = '';
    const pending = state.notes.filter(r=>!r.done);
    const done = state.notes.filter(r=>r.done);
    if(pending.length===0 && done.length===0){
      pendingWrap.innerHTML = `<div class="empty-state">No notes yet.<br>Tap + to add one.</div>`;
    } else if(pending.length===0){
      pendingWrap.innerHTML = `<div class="empty-state">All clear. Nothing pending.</div>`;
    } else {
      pending.forEach(r=> pendingWrap.appendChild(noteCard(r)));
    }
    if(done.length>0){
      const divider = document.createElement('div');
      divider.className = 'done-divider'; divider.textContent = 'Done';
      doneWrapOuter.appendChild(divider);
      const doneList = document.createElement('div'); doneList.className = 'list';
      done.forEach(r=> doneList.appendChild(noteCard(r)));
      doneWrapOuter.appendChild(doneList);
    }
  }
  function noteCard(r){
    const card = document.createElement('div');
    card.className = 'note-card glass';
    const repeatLabel = r.repeat==='daily' ? 'Daily' : r.repeat==='weekly' ? 'Weekly' : 'One-time';
    card.innerHTML = `
      <div class="note-check ${r.done?'checked':''}" style="${r.done?'background:'+r.color+';border-color:'+r.color:''}">${CHECK_SVG}</div>
      <div class="note-body">
        <div class="note-text ${r.done?'done':''}">${escapeHtml(r.text)}</div>
        <div class="note-meta">${repeatLabel}</div>
      </div>
      <button class="dots-btn" data-note-menu="${r.id}"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
    `;
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.dots-btn')) return;
      toggleNote(r.id);
    });
    card.querySelector('.dots-btn').addEventListener('click', (e)=>{ e.stopPropagation(); openCtxMenu(e, 'note', r.id); });
    return card;
  }
  async function toggleNote(id){
    const r = state.notes.find(x=>x.id===id);
    if(!r) return;
    r.done = !r.done; r.doneAt = r.done ? Date.now() : null;
    renderNotes();
    await saveNotes();
  }

  // ---------- CONTEXT MENU ----------
  function openCtxMenu(e, type, id){
    ctxTarget = {type, id};
    const menu = document.getElementById('ctxMenu');
    const rect = e.currentTarget.getBoundingClientRect();
    menu.style.top = (rect.bottom + 6) + 'px';
    menu.style.left = Math.max(12, rect.right - 150) + 'px';
    menu.classList.add('active');
    document.getElementById('ctxBackdrop').classList.add('active');
  }
  function closeCtxMenu(){
    document.getElementById('ctxMenu').classList.remove('active');
    document.getElementById('ctxBackdrop').classList.remove('active');
  }
  document.getElementById('ctxBackdrop').addEventListener('click', closeCtxMenu);
  document.getElementById('ctxEdit').addEventListener('click', ()=>{
    if(!ctxTarget) return;
    closeCtxMenu();
    if(ctxTarget.type==='habit') openHabitModal(state.habits.find(h=>h.id===ctxTarget.id));
    else openNoteModal(state.notes.find(r=>r.id===ctxTarget.id));
  });
  document.getElementById('ctxDelete').addEventListener('click', async ()=>{
    if(!ctxTarget) return;
    closeCtxMenu();
    if(ctxTarget.type==='habit'){
      const h = state.habits.find(x=>x.id===ctxTarget.id);
      const ok = await askConfirm('Delete "'+h.name+'"? This removes its whole history too.');
      if(!ok) return;
      state.habits = state.habits.filter(x=>x.id!==ctxTarget.id);
      delete state.logs[ctxTarget.id];
      await saveHabits();
      renderHabitList(); renderProgressList(); renderScore(); renderTrendChart();
    } else {
      const r = state.notes.find(x=>x.id===ctxTarget.id);
      const ok = await askConfirm('Delete "'+r.text+'"?');
      if(!ok) return;
      state.notes = state.notes.filter(x=>x.id!==ctxTarget.id);
      await saveNotes();
      renderNotes();
    }
  });

  function askConfirm(message){
    return new Promise((resolve)=>{
      document.getElementById('confirmModalBody').textContent = message;
      document.getElementById('confirmModalBackdrop').classList.add('active');
      const okBtn = document.getElementById('confirmOkBtn');
      const cancelBtn = document.getElementById('confirmCancelBtn');
      function cleanup(result){
        document.getElementById('confirmModalBackdrop').classList.remove('active');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        resolve(result);
      }
      function onOk(){ cleanup(true); }
      function onCancel(){ cleanup(false); }
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
    });
  }

  // ---------- HABIT MODAL ----------
  let editingHabitId = null;
  let selectedHabitColor = PALETTE[0];
  let selectedHabitDays = [0,1,2,3,4,5,6];
  function buildColorRow(container, onSelect, initial){
    container.innerHTML = '';
    PALETTE.forEach(c=>{
      const sw = document.createElement('div');
      sw.className = 'swatch' + (c===initial ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', ()=>{
        container.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected'); onSelect(c);
      });
      container.appendChild(sw);
    });
  }
  function buildDayPicker(initialDays){
    const container = document.getElementById('habitDayPicker');
    container.innerHTML = '';
    selectedHabitDays = [...initialDays];
    DOW_SHORT.forEach((label, idx)=>{
      const chip = document.createElement('div');
      chip.className = 'day-chip' + (selectedHabitDays.includes(idx) ? ' selected' : '');
      chip.textContent = label;
      chip.addEventListener('click', ()=>{
        if(selectedHabitDays.includes(idx)) selectedHabitDays = selectedHabitDays.filter(d=>d!==idx);
        else selectedHabitDays.push(idx);
        chip.classList.toggle('selected');
      });
      container.appendChild(chip);
    });
  }
  function openHabitModal(h){
    editingHabitId = h ? h.id : null;
    document.getElementById('habitModalTitle').textContent = h ? 'Edit habit' : 'New habit';
    document.getElementById('habitNameInput').value = h ? h.name : '';
    selectedHabitColor = h ? h.color : PALETTE[Math.floor(Math.random()*PALETTE.length)];
    buildColorRow(document.getElementById('habitColorRow'), c=>selectedHabitColor=c, selectedHabitColor);
    buildDayPicker(h && h.days ? h.days : [0,1,2,3,4,5,6]);
    document.getElementById('habitModalBackdrop').classList.add('active');
  }
  function closeHabitModal(){ document.getElementById('habitModalBackdrop').classList.remove('active'); }
  document.getElementById('habitCancelBtn').addEventListener('click', closeHabitModal);
  document.getElementById('habitSaveBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('habitNameInput').value.trim();
    if(!name) return;
    const days = selectedHabitDays.length ? selectedHabitDays : [0,1,2,3,4,5,6];
    if(editingHabitId){
      const h = state.habits.find(x=>x.id===editingHabitId);
      h.name = name; h.color = selectedHabitColor; h.days = days;
    } else {
      state.habits.push({id:uid(), name, color:selectedHabitColor, days});
    }
    await saveHabits();
    renderHabitList(); renderProgressList(); renderScore(); renderTrendChart();
    closeHabitModal();
  });

  // ---------- NOTE MODAL ----------
  let editingNoteId = null;
  let selectedNoteColor = PALETTE[0];
  let selectedRepeat = 'once';
  function openNoteModal(r){
    editingNoteId = r ? r.id : null;
    document.getElementById('noteModalTitle').textContent = r ? 'Edit note' : 'New note';
    document.getElementById('noteTextInput').value = r ? r.text : '';
    selectedNoteColor = r ? r.color : PALETTE[Math.floor(Math.random()*PALETTE.length)];
    selectedRepeat = r ? r.repeat : 'once';
    buildColorRow(document.getElementById('noteColorRow'), c=>selectedNoteColor=c, selectedNoteColor);
    document.querySelectorAll('#noteRepeatRow .repeat-opt').forEach(el=> el.classList.toggle('selected', el.dataset.val===selectedRepeat));
    document.getElementById('noteModalBackdrop').classList.add('active');
  }
  function closeNoteModal(){ document.getElementById('noteModalBackdrop').classList.remove('active'); }
  document.querySelectorAll('#noteRepeatRow .repeat-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedRepeat = el.dataset.val;
      document.querySelectorAll('#noteRepeatRow .repeat-opt').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
  document.getElementById('noteCancelBtn').addEventListener('click', closeNoteModal);
  document.getElementById('noteSaveBtn').addEventListener('click', async ()=>{
    const text = document.getElementById('noteTextInput').value.trim();
    if(!text) return;
    if(editingNoteId){
      const r = state.notes.find(x=>x.id===editingNoteId);
      r.text=text; r.repeat=selectedRepeat; r.color=selectedNoteColor;
    } else {
      state.notes.push({id:uid(), text, repeat:selectedRepeat, color:selectedNoteColor, done:false, doneAt:null});
    }
    await saveNotes();
    renderNotes();
    closeNoteModal();
  });

  // ---------- FAB ----------
  document.getElementById('fabBtn').addEventListener('click', ()=>{
    const active = document.querySelector('.screen.active').id;
    if(active==='screen-notes') openNoteModal(null);
    else openHabitModal(null);
  });

  // ---------- NAME MODAL ----------
  document.getElementById('nameSaveBtn').addEventListener('click', async ()=>{
    const val = document.getElementById('nameInput').value.trim();
    if(!val) return;
    state.name = val;
    document.getElementById('nameModalBackdrop').classList.remove('active');
    renderGreeting();
    await saveProfile();
  });

  // ---------- INIT ----------
  async function init(){
    initTheme();
    await loadState();
    if(!state.name) document.getElementById('nameModalBackdrop').classList.add('active');
    renderGreeting();
    renderWeekStrip();
    renderHabitList();
    renderProgressList();
    renderNotes();
    renderScore();
    renderTrendChart();
  }
  init();

})();
</script>
</body>
</html>
