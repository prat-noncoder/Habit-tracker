<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0C10;
    --panel: #15171D;
    --panel-raised: #1B1E25;
    --border: #262933;
    --text: #EDEEF0;
    --text-dim: #8A8F98;
    --text-faint: #565A64;
    --accent: #6C5CE7;
    --accent-dim: #6C5CE733;
    --danger: #FB7185;

    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Header ---------- */
  .topbar{
    padding:calc(env(safe-area-inset-top) + 18px) 20px 0;
    flex-shrink:0;
  }
  .topbar .greeting{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin-bottom:2px;
  }
  .topbar .name{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.01em;
  }

  /* ---------- Week strip ---------- */
  .strip-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 18px) 20px 14px;
  }
  .strip-nav-btn{
    width:34px; height:34px;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:17px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .strip-nav-btn:active{ transform:scale(0.9); }
  .strip-label-btn{
    display:flex; align-items:center; gap:8px;
    background:none; border:none;
    font-family:var(--font-display);
    font-size:19px; font-weight:700;
    color:var(--text);
  }
  .strip-label-btn svg{ width:18px; height:18px; stroke:var(--text-faint); }
  .week-strip{
    display:flex;
    gap:8px;
    padding:0 20px 20px;
    overflow-x:auto;
  }
  .week-day{
    flex:1;
    min-width:40px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:10px 4px;
    border-radius:14px;
    cursor:pointer;
  }
  .week-day .wd-label{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
  }
  .week-day .wd-num{
    font-family:var(--font-display);
    font-size:20px;
    font-weight:700;
    color:var(--text);
  }
  .week-day.selected{ background:#34D399; }
  .week-day.selected .wd-label, .week-day.selected .wd-num{ color:#08130E; }

  /* ---------- Daily score card ---------- */
  .score-card{
    margin:16px 20px 18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:16px;
  }
  .score-ring-wrap{ position:relative; width:58px; height:58px; flex-shrink:0; }
  .score-ring-wrap svg{ width:58px; height:58px; transform:rotate(-90deg); }
  .score-ring-bg{ fill:none; stroke:var(--panel-raised); stroke-width:6; }
  .score-ring-fill{ fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dasharray 0.4s cubic-bezier(.16,1,.3,1); }
  .score-ring-pct{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--text);
  }
  .score-mid{ flex:1; min-width:0; }
  .score-title{ font-family:var(--font-display); font-size:16px; font-weight:700; }
  .score-sub{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:3px; letter-spacing:0.02em; }
  .score-frac{
    font-family:var(--font-mono);
    font-size:22px;
    font-weight:600;
    color:var(--text);
    flex-shrink:0;
    text-align:right;
  }
  .score-frac span{ font-size:13px; color:var(--text-faint); }

  /* ---------- Screens ---------- */
  .screen{
    flex:1;
    overflow-y:auto;
    display:none;
    padding-bottom:100px;
    -webkit-overflow-scrolling:touch;
  }
  .screen.active{ display:block; }

  /* ---------- Month/Year pill (Today screen) ---------- */
  .date-pill{
    margin:0 20px 18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:13px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:transform 0.12s ease;
  }
  .date-pill:active{ transform:scale(0.98); }
  .date-pill-icon{
    width:36px; height:36px;
    border-radius:10px;
    background:var(--accent-dim);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .date-pill-icon svg{ width:18px; height:18px; stroke:var(--accent); }
  .date-pill-text{ flex:1; }
  .date-pill-label{
    font-family:var(--font-mono);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-faint);
  }
  .date-pill-value{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:600;
    margin-top:1px;
  }
  .date-pill-chevron{ color:var(--text-faint); font-size:18px; }

  /* ---------- Habit list ---------- */
  .section-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    padding:0 20px;
    margin-bottom:10px;
  }
  .list{ padding:0 20px; display:flex; flex-direction:column; gap:8px; }

  .habit-card{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 10px 12px 12px;
  }
  .check-circle{
    width:28px; height:28px;
    border-radius:9px;
    border:2px solid var(--border);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.15s cubic-bezier(.34,1.56,.64,1), background 0.15s ease, border-color 0.15s ease;
  }
  .check-circle:active{ transform:scale(0.85); }
  .check-circle svg{ width:14px; height:14px; opacity:0; transform:scale(0.5); transition:opacity 0.15s ease, transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  .check-circle.checked svg{ opacity:1; transform:scale(1); }
  .habit-name{
    font-size:15px;
    font-weight:500;
    flex:1;
    transition:color 0.15s ease;
  }
  .habit-name.done{
    color:var(--text-faint);
    text-decoration:line-through;
    text-decoration-thickness:1.5px;
  }
  .habit-time{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    flex-shrink:0;
  }
  .dots-btn{
    background:none; border:none; color:var(--text-faint);
    font-size:18px; padding:4px 6px; flex-shrink:0; line-height:1;
    letter-spacing:1px;
  }
  .trash-btn{
    background:none; border:none; color:var(--text-faint);
    flex-shrink:0; padding:4px;
    display:flex; align-items:center; justify-content:center;
  }
  .trash-btn svg{ width:19px; height:19px; }
  .trash-btn:active{ transform:scale(0.9); }
  .habit-card-body{ display:flex; flex-direction:column; flex:1; min-width:0; gap:1px; cursor:pointer; }

  .empty-state{
    padding:40px 20px;
    text-align:center;
    color:var(--text-faint);
    font-size:14px;
    line-height:1.6;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:absolute;
    right:20px;
    bottom:calc(90px + env(safe-area-inset-bottom));
    width:54px; height:54px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    border:none;
    font-size:26px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px -6px #6C5CE788;
    z-index:20;
    transition:transform 0.12s ease;
  }
  .fab:active{ transform:scale(0.9); }

  /* ---------- Progress screen ---------- */
  .habit-progress-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 16px;
    margin:0 20px 12px;
    cursor:pointer;
    transition:transform 0.12s ease;
  }
  .habit-progress-card:active{ transform:scale(0.985); }
  .hp-head{
    display:flex; align-items:center; gap:10px; margin-bottom:11px;
  }
  .hp-head .habit-name{ font-family:var(--font-display); font-weight:600; flex:initial; }
  .hp-streak{
    margin-left:auto;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .hp-grid{
    display:flex;
    gap:6px;
  }
  .box{
    width:22px; height:22px;
    border-radius:6px;
    background:var(--panel-raised);
    border:1px solid var(--border);
    transition:background 0.2s ease, border-color 0.2s ease;
  }
  .box.filled{ border-color:transparent; }

  /* Detail (monthly view) */
  .detail-header{
    display:flex; align-items:center; gap:12px;
    padding:14px 20px 10px;
  }
  .back-btn{
    width:34px; height:34px;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .detail-title{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .stat-row{
    display:flex; gap:10px;
    padding:6px 20px 18px;
  }
  .stat-box{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
  }
  .stat-num{
    font-family:var(--font-mono);
    font-size:20px;
    font-weight:600;
  }
  .stat-cap{
    font-size:10px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-top:2px;
  }
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px 14px;
  }
  .month-nav-btn{
    width:32px; height:32px;
    border-radius:9px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .month-nav-btn:active{ transform:scale(0.9); }
  .month-nav-label{
    font-family:var(--font-display);
    font-size:15px;
    font-weight:600;
  }
  .month-grid-wrap{ padding:0 20px 30px; }
  .dow-row{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
    margin-bottom:8px;
  }
  .dow-cell{
    text-align:center;
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--text-faint);
    letter-spacing:0.03em;
  }
  .month-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
  }
  .day-box{
    aspect-ratio:1;
    border-radius:8px;
    background:var(--panel-raised);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--text-faint);
    transition:background 0.2s ease, border-color 0.2s ease;
  }
  .day-box.filled{ border-color:transparent; color:rgba(0,0,0,0.55); font-weight:600; }
  .day-box.empty{ background:transparent; border:none; }
  .day-box.today-mark{ border-color:var(--accent); border-width:1.5px; }
  .day-box.future{ opacity:0.3; }

  /* ---------- Reminders screen ---------- */
  .reminder-card{
    display:flex; align-items:center; gap:12px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 10px 12px 12px;
  }
  .reminder-tag-check{
    width:26px; height:26px;
    border-radius:50%;
    border:2px solid var(--border);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .reminder-tag-check:active{ transform:scale(0.85); }
  .reminder-tag-check svg{ width:14px; height:14px; opacity:0; transform:scale(0.5); transition:opacity 0.15s ease, transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  .reminder-tag-check.checked svg{ opacity:1; transform:scale(1); }
  .reminder-body{ flex:1; min-width:0; }
  .reminder-text{ font-size:15px; font-weight:500; }
  .reminder-text.done{ color:var(--text-faint); text-decoration:line-through; text-decoration-thickness:1.5px; }
  .reminder-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    margin-top:2px;
  }
  .done-divider{
    padding:20px 20px 10px;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    display:flex; align-items:center; gap:8px;
  }
  .done-divider::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }

  /* ---------- Bottom nav ---------- */
  .bottomnav{
    position:absolute;
    left:0; right:0; bottom:0;
    display:flex;
    background:rgba(21,23,29,0.92);
    backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-btn{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--text-faint);
    font-family:var(--font-body);
    font-size:11px;
    padding:6px 0;
    transition:color 0.15s ease;
  }
  .nav-btn.active{ color:var(--text); }
  .nav-btn svg{ width:22px; height:22px; transition:stroke 0.15s ease; }
  .nav-btn.active svg{ stroke:var(--accent); }

  /* ---------- Modals ---------- */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    z-index:100;
  }
  .modal-backdrop.active{ display:flex; }
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:22px 22px 0 0;
    width:100%;
    max-width:480px;
    margin:0 auto;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:85vh;
    overflow-y:auto;
    animation:slideUp 0.22s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp{ from{ transform:translateY(24px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal-title{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:700;
    margin-bottom:18px;
  }
  .field-label{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-faint);
    margin-bottom:8px;
    display:block;
  }
  .field{ margin-bottom:18px; }
  input[type=text], input[type=time]{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    padding:13px 14px;
    border-radius:12px;
    outline:none;
  }
  input[type=text]:focus, input[type=time]:focus{ border-color:var(--accent); }
  .color-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .swatch{
    width:34px; height:34px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    transition:transform 0.12s ease;
  }
  .swatch.selected{ border-color:var(--text); transform:scale(1.1); }
  .repeat-row{ display:flex; gap:8px; }
  .repeat-opt{
    flex:1;
    padding:10px;
    text-align:center;
    background:var(--panel-raised);
    border:1px solid var(--border);
    border-radius:10px;
    font-size:13px;
    color:var(--text-dim);
    cursor:pointer;
    transition:background 0.12s ease, border-color 0.12s ease;
  }
  .repeat-opt.selected{ background:var(--accent-dim); border-color:var(--accent); color:var(--text); }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .btn{
    flex:1;
    padding:14px;
    border-radius:12px;
    border:none;
    font-family:var(--font-body);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:transform 0.1s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-ghost{ background:var(--panel-raised); color:var(--text-dim); border:1px solid var(--border); }
  .btn-delete{ background:transparent; color:var(--danger); text-decoration:underline; font-weight:500; margin-top:14px; width:100%; text-align:center; font-size:13px; }

  /* ---------- Calendar picker modal ---------- */
  .picker-month-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .picker-cancel{
    display:block;
    text-align:center;
    padding:14px;
    color:var(--text-dim);
    font-size:14px;
    margin-top:10px;
  }

  /* ---------- Context menu ---------- */
  .ctx-menu{
    position:fixed;
    background:var(--panel-raised);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    z-index:200;
    box-shadow:0 12px 30px -8px rgba(0,0,0,0.5);
    display:none;
    min-width:140px;
  }
  .ctx-menu.active{ display:block; }
  .ctx-item{
    padding:12px 16px;
    font-size:14px;
    color:var(--text);
    cursor:pointer;
  }
  .ctx-item:active{ background:var(--border); }
  .ctx-item.danger{ color:var(--danger); }
  .ctx-divider{ height:1px; background:var(--border); }
  .ctx-backdrop{
    position:fixed; inset:0; z-index:199; display:none;
  }
  .ctx-backdrop.active{ display:block; }

  ::-webkit-scrollbar{ display:none; }

  /* ---------- Celebration ---------- */
  .celebrate-overlay{
    position:fixed; inset:0; z-index:300;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .celebrate-msg{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px 28px;
    font-family:var(--font-display);
    font-size:18px;
    font-weight:700;
    color:var(--text);
    opacity:0;
    transform:scale(0.85) translateY(8px);
    animation:celebratePop 2.4s ease forwards;
    box-shadow:0 20px 50px -12px rgba(0,0,0,0.6);
  }
  @keyframes celebratePop{
    0%{ opacity:0; transform:scale(0.85) translateY(8px); }
    15%{ opacity:1; transform:scale(1) translateY(0); }
    80%{ opacity:1; transform:scale(1) translateY(0); }
    100%{ opacity:0; transform:scale(0.95) translateY(-6px); }
  }
  .confetti-piece{
    position:fixed;
    top:-20px;
    width:8px; height:14px;
    z-index:299;
    pointer-events:none;
    animation-name:confettiFall;
    animation-timing-function:cubic-bezier(.25,.46,.45,.94);
    animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(540deg); opacity:0.9; }
  }
</style>
</head>
<body>

<div id="app">

  <div class="topbar" style="display:none">
    <div class="greeting" id="greetingLabel">TODAY</div>
    <div class="name" id="nameDisplay">—</div>
  </div>

  <!-- SCREEN 1: TODAY -->
  <div class="screen active" id="screen-today">
    <div class="strip-header">
      <button class="strip-nav-btn" id="stripPrev">‹</button>
      <button class="strip-label-btn" id="stripCalendarBtn">
        <span id="stripMonthLabel">July 2026</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      </button>
      <button class="strip-nav-btn" id="stripNext">›</button>
    </div>
    <div class="week-strip" id="weekStrip"></div>

    <div class="score-card" id="scoreCard">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 58 58">
          <circle class="score-ring-bg" cx="29" cy="29" r="24"></circle>
          <circle class="score-ring-fill" id="scoreRingFill" cx="29" cy="29" r="24" stroke-dasharray="0 151"></circle>
        </svg>
        <div class="score-ring-pct" id="scoreRingPct">0%</div>
      </div>
      <div class="score-mid">
        <div class="score-title">Daily Score</div>
        <div class="score-sub" id="scoreSub">Ready to begin</div>
      </div>
      <div class="score-frac" id="scoreFrac">0<span>/0</span></div>
    </div>

    <div class="section-label" id="habitListLabel">Habits</div>
    <div class="list" id="habitList"></div>
  </div>

  <!-- SCREEN 2: PROGRESS (list) -->
  <div class="screen" id="screen-progress">
    <div style="height:4px"></div>
    <div id="progressList"></div>
  </div>

  <!-- SCREEN 2b: PROGRESS (detail, monthly) -->
  <div class="screen" id="screen-detail">
    <div class="detail-header">
      <button class="back-btn" id="detailBack">←</button>
      <div class="detail-title" id="detailTitle"><span></span></div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="detailStreak">0</div><div class="stat-cap">Current streak</div></div>
      <div class="stat-box"><div class="stat-num" id="detailBest">0</div><div class="stat-cap">Best streak</div></div>
      <div class="stat-box"><div class="stat-num" id="detailTotal">0</div><div class="stat-cap">Total days</div></div>
    </div>
    <div class="month-nav">
      <button class="month-nav-btn" id="monthPrev">‹</button>
      <div class="month-nav-label" id="monthLabel">July 2026</div>
      <button class="month-nav-btn" id="monthNext">›</button>
    </div>
    <div class="month-grid-wrap">
      <div class="dow-row">
        <div class="dow-cell">S</div><div class="dow-cell">M</div><div class="dow-cell">T</div><div class="dow-cell">W</div><div class="dow-cell">T</div><div class="dow-cell">F</div><div class="dow-cell">S</div>
      </div>
      <div class="month-grid" id="monthGrid"></div>
    </div>
  </div>

  <!-- SCREEN 3: REMINDERS -->
  <div class="screen" id="screen-reminders">
    <div class="section-label" style="margin-top:4px;">Pending</div>
    <div class="list" id="reminderPendingList"></div>
    <div id="reminderDoneWrap"></div>
  </div>

  <button class="fab" id="fabBtn">+</button>

  <div class="bottomnav">
    <button class="nav-btn active" data-screen="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      Today
    </button>
    <button class="nav-btn" data-screen="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      Progress
    </button>
    <button class="nav-btn" data-screen="reminders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z"/><path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16l-2-2z"/></svg>
      Reminders
    </button>
  </div>

</div>

<!-- CONTEXT MENU -->
<div class="ctx-backdrop" id="ctxBackdrop"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxEdit">Edit</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctxDelete">Delete</div>
</div>

<!-- MODAL: Date picker (calendar) -->
<div class="modal-backdrop" id="pickerModalBackdrop">
  <div class="modal">
    <div class="modal-title">Jump to a date</div>
    <div class="picker-month-nav">
      <button class="month-nav-btn" id="pickerPrev">‹</button>
      <div class="month-nav-label" id="pickerLabel">July 2026</div>
      <button class="month-nav-btn" id="pickerNext">›</button>
    </div>
    <div class="dow-row">
      <div class="dow-cell">S</div><div class="dow-cell">M</div><div class="dow-cell">T</div><div class="dow-cell">W</div><div class="dow-cell">T</div><div class="dow-cell">F</div><div class="dow-cell">S</div>
    </div>
    <div class="month-grid" id="pickerGrid" style="margin-bottom:8px;"></div>
    <div class="picker-cancel" id="pickerCancel">Cancel</div>
  </div>
</div>

<!-- MODAL: Add/Edit Habit -->
<div class="modal-backdrop" id="habitModalBackdrop">
  <div class="modal">
    <div class="modal-title" id="habitModalTitle">New habit</div>
    <div class="field">
      <label class="field-label">Name</label>
      <input type="text" id="habitNameInput" placeholder="e.g. Workout" maxlength="40">
    </div>
    <div class="field">
      <label class="field-label">Color</label>
      <div class="color-row" id="habitColorRow"></div>
    </div>
    <div class="field">
      <label class="field-label">Reminder time (optional)</label>
      <input type="time" id="habitTimeInput">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="habitCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="habitSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Add/Edit Reminder -->
<div class="modal-backdrop" id="reminderModalBackdrop">
  <div class="modal">
    <div class="modal-title" id="reminderModalTitle">New reminder</div>
    <div class="field">
      <label class="field-label">What is it?</label>
      <input type="text" id="reminderTextInput" placeholder="e.g. Send Dineflow invoice" maxlength="60">
    </div>
    <div class="field">
      <label class="field-label">Time</label>
      <input type="time" id="reminderTimeInput">
    </div>
    <div class="field">
      <label class="field-label">Repeat</label>
      <div class="repeat-row" id="reminderRepeatRow">
        <div class="repeat-opt" data-val="once">One-time</div>
        <div class="repeat-opt" data-val="daily">Daily</div>
        <div class="repeat-opt" data-val="weekly">Weekly</div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Tag color</label>
      <div class="color-row" id="reminderColorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="reminderCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="reminderSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Name entry (first run) -->
<div class="modal-backdrop" id="nameModalBackdrop">
  <div class="modal">
    <div class="modal-title">What should we call you?</div>
    <div class="field">
      <input type="text" id="nameInput" placeholder="Your name" maxlength="24">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="nameSaveBtn" style="flex:1">Continue</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm delete -->
<div class="modal-backdrop" id="confirmModalBackdrop">
  <div class="modal">
    <div class="modal-title" id="confirmModalTitle">Delete this?</div>
    <p style="color:var(--text-dim); font-size:14px; margin-bottom:20px;" id="confirmModalBody"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirmCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="confirmOkBtn" style="background:var(--danger)">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="./assets/script.js"></script>
</body>
</html>
